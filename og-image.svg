<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f1419"/>
      <stop offset="100%" style="stop-color:#1a1f25"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ffd700"/>
      <stop offset="100%" style="stop-color:#ff8c00"/>
    </linearGradient>
  </defs>
  
  <rect width="1200" height="630" fill="url(#bg)"/>
  
  <!-- Decorative grid lines -->
  <g opacity="0.05" stroke="#fff" stroke-width="1">
    <line x1="0" y1="150" x2="1200" y2="150"/>
    <line x1="0" y1="300" x2="1200" y2="300"/>
    <line x1="0" y1="450" x2="1200" y2="450"/>
    <line x1="300" y1="0" x2="300" y2="630"/>
    <line x1="600" y1="0" x2="600" y2="630"/>
    <line x1="900" y1="0" x2="900" y2="630"/>
  </g>
  
  <!-- Logo symbol -->
  <text x="600" y="220" font-family="monospace" font-size="100" text-anchor="middle" fill="url(#accent)">
    SELECT * FROM career
  </text>
  
  <!-- Title -->
  <text x="600" y="340" font-family="system-ui, sans-serif" font-size="72" font-weight="700" text-anchor="middle" fill="url(#accent)">
    VolSQL
  </text>
  
  <!-- Subtitle -->
  <text x="600" y="420" font-family="system-ui, sans-serif" font-size="32" text-anchor="middle" fill="#8b98a5">
    Learn SQL for Your Actual Job
  </text>
  
  <!-- Features -->
  <g font-family="system-ui, sans-serif" font-size="24" fill="#e7e9ea" text-anchor="middle">
    <text x="300" y="520">14 Lessons</text>
    <text x="600" y="520">Run in Browser</text>
    <text x="900" y="520">100% Free</text>
  </g>
  
  <!-- Bottom accent line -->
  <rect x="0" y="620" width="1200" height="10" fill="url(#accent)"/>
</svg>
